version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-photo_map}
      POSTGRES_USER: ${POSTGRES_USER:-photo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
    volumes:
      - ${HOST_DATA_DIR:?set HOST_DATA_DIR}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-photo_user} -d ${POSTGRES_DB:-photo_map}"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${HOST_DATA_DIR:?set HOST_DATA_DIR}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 10s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-photo_map}
      POSTGRES_USER: ${POSTGRES_USER:-photo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-photo_user}:${POSTGRES_PASSWORD:-change_this_password}@db:5432/${POSTGRES_DB:-photo_map}

      REDIS_URL: redis://redis:6379/0

      DATA_DIR: /data
      ORIGINALS_DIR: /data/originals
      UPLOADS_DIR: /data/uploads
      THUMBNAILS_DIR: /data/thumbnails
      PREVIEWS_DIR: /data/previews
      EXPORTS_DIR: /data/exports
      TEMP_DIR: /data/temp
      LOG_DIR: /data/logs
      REPORTS_DIR: /data/reports
      BACKUPS_DIR: /data/backups

      MEDIA_URL_PREFIX: /media
      MEDIA_PREFIX: /media

      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?set PUBLIC_BASE_URL}
      API_BASE_URL: ${API_BASE_URL:?set API_BASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS}

      DB_STARTUP_RETRY_SECONDS: ${DB_STARTUP_RETRY_SECONDS:-0}
      DB_STARTUP_RETRY_INTERVAL: ${DB_STARTUP_RETRY_INTERVAL:-3}

      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-50}
      MAX_UPLOAD_FILES: ${MAX_UPLOAD_FILES:-999}
    volumes:
      - ${HOST_DATA_DIR:?set HOST_DATA_DIR}:/data
    ports:
      - "${API_PORT:?set API_PORT}:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()\""
        ]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 30s

  worker-media:
    build:
      context: ./worker
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-photo_map}
      POSTGRES_USER: ${POSTGRES_USER:-photo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-photo_user}:${POSTGRES_PASSWORD:-change_this_password}@db:5432/${POSTGRES_DB:-photo_map}

      REDIS_URL: redis://redis:6379/0

      DATA_DIR: /data
      ORIGINALS_DIR: /data/originals
      UPLOADS_DIR: /data/uploads
      THUMBNAILS_DIR: /data/thumbnails
      PREVIEWS_DIR: /data/previews
      EXPORTS_DIR: /data/exports
      TEMP_DIR: /data/temp
      LOG_DIR: /data/logs
      REPORTS_DIR: /data/reports
      BACKUPS_DIR: /data/backups

      MEDIA_URL_PREFIX: /media
      MEDIA_PREFIX: /media

      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-50}
      MAX_UPLOAD_FILES: ${MAX_UPLOAD_FILES:-999}
    volumes:
      - ${HOST_DATA_DIR:?set HOST_DATA_DIR}:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:?set VITE_API_BASE_URL}
      VITE_MAX_UPLOAD_FILES: ${VITE_MAX_UPLOAD_FILES:-999}
      VITE_UPLOAD_CONCURRENCY: ${VITE_UPLOAD_CONCURRENCY:-2}
    ports:
      - "${FRONTEND_PORT:?set FRONTEND_PORT}:5173"

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME:-engineering-photo-map}_default
    driver: bridge
